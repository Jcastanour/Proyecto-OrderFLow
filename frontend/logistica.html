<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel Kanban logístico de OrderFlow — gestión de pedidos en tiempo real para cocina y despacho.">
    <title>Logística Kanban · OrderFlow</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/styles/tokens.css">
    <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="logistica">

    <header class="nav-top kanban-nav">
        <div class="contenedor nav-top__fila">
            <a href="logistica.html" class="marca" style="text-decoration:none;">
                🚚 Panel <span class="marca__acento">Logística</span>
            </a>
            <a href="index.html">← Volver al cliente</a>
        </div>
    </header>

    <main class="contenedor" style="padding-bottom:48px;">

        <div class="kanban-barra">
            <div>
                <span class="kicker" style="background:rgba(232,93,28,0.14); color:#ffb487; border-color:rgba(232,93,28,0.3);">
                    <span class="latido" style="width:8px; height:8px;"></span>
                    Centro de despacho
                </span>
                <h2 class="kanban-h" style="margin-top:12px;">Tablero <em>Kanban</em> en tiempo real</h2>
            </div>
            <button id="btnRecargar" class="btn-recargar">
                🔄 Refrescar tablero
            </button>
        </div>

        <section class="kanban-tablero">

            <div class="kanban-col" data-estado="Recibido">
                <div class="kanban-col__head">
                    <span class="kanban-col__nombre">Recibidos</span>
                    <span class="kanban-col__count" id="countRecibido">0</span>
                </div>
                <div id="columnaRecibido" class="kanban-col__body"></div>
            </div>

            <div class="kanban-col" data-estado="En Cocina">
                <div class="kanban-col__head">
                    <span class="kanban-col__nombre">En cocina</span>
                    <span class="kanban-col__count" id="countCocina">0</span>
                </div>
                <div id="columnaCocina" class="kanban-col__body"></div>
            </div>

            <div class="kanban-col" data-estado="En Camino">
                <div class="kanban-col__head">
                    <span class="kanban-col__nombre">En camino</span>
                    <span class="kanban-col__count" id="countCamino">0</span>
                </div>
                <div id="columnaCamino" class="kanban-col__body"></div>
            </div>

            <div class="kanban-col" data-estado="Entregado">
                <div class="kanban-col__head">
                    <span class="kanban-col__nombre">Entregados</span>
                    <span class="kanban-col__count" id="countEntregado">0</span>
                </div>
                <div id="columnaEntregado" class="kanban-col__body"></div>
            </div>
        </section>
    </main>

    <script type="module" src="assets/scripts/logisticaApp.js"></script>
</body>
</html>
