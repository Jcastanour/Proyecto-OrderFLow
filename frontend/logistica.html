<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Kanban - OrderFlow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 font-sans pb-10">

    <!-- Navbar -->
    <nav class="bg-gray-800 p-4 shadow-xl border-b border-gray-700 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-black tracking-tighter text-orange-500">🚚 Panel <span class="text-white">Logística</span></h1>
            <a href="index.html" class="text-sm font-semibold text-gray-400 hover:text-white transition">← Volver al Cliente</a>
        </div>
    </nav>

    <!-- Main Kanban Board -->
    <main class="container mx-auto px-2 mt-6 max-w-[1400px]">
        
        <!-- Controles globales -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-100 hidden md:block">Centro de Despacho (Kanban)</h2>
            <button id="btnRecargar" class="w-full md:w-auto bg-gray-700 hover:bg-gray-600 text-sm py-3 px-6 md:py-2 md:px-4 rounded-lg transition shadow font-bold border border-gray-600">
                🔄 Refrescar Tablero
            </button>
        </div>

        <!-- Columnas (Grid de 4) -->
        <div class="flex flex-col md:flex-row gap-4 h-[75vh] overflow-x-auto pb-4">
            
            <!-- Columna: Recibido -->
            <div class="w-full md:w-1/4 bg-gray-800 rounded-xl flex flex-col border-t-4 border-blue-500 overflow-hidden shadow-lg min-w-[280px]">
                <div class="bg-gray-800/50 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="font-bold uppercase tracking-wider text-sm text-blue-400">Recibidos (<span id="countRecibido">0</span>)</h3>
                </div>
                <div id="columnaRecibido" class="flex-1 p-3 overflow-y-auto space-y-3 bg-gray-800/30">
                    <!-- Tarjetas Creadas Dinamicamente -->
                </div>
            </div>

            <!-- Columna: En Cocina -->
            <div class="w-full md:w-1/4 bg-gray-800 rounded-xl flex flex-col border-t-4 border-yellow-500 overflow-hidden shadow-lg min-w-[280px]">
                <div class="bg-gray-800/50 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="font-bold uppercase tracking-wider text-sm text-yellow-400">En Cocina (<span id="countCocina">0</span>)</h3>
                </div>
                <div id="columnaCocina" class="flex-1 p-3 overflow-y-auto space-y-3 bg-gray-800/30">
                </div>
            </div>

            <!-- Columna: En Camino -->
            <div class="w-full md:w-1/4 bg-gray-800 rounded-xl flex flex-col border-t-4 border-orange-500 overflow-hidden shadow-lg min-w-[280px]">
                <div class="bg-gray-800/50 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="font-bold uppercase tracking-wider text-sm text-orange-400">En Camino (<span id="countCamino">0</span>)</h3>
                </div>
                <div id="columnaCamino" class="flex-1 p-3 overflow-y-auto space-y-3 bg-gray-800/30">
                </div>
            </div>

            <!-- Columna: Entregado -->
            <div class="w-full md:w-1/4 bg-gray-800 rounded-xl flex flex-col border-t-4 border-green-500 overflow-hidden shadow-lg min-w-[280px]">
                <div class="bg-gray-800/50 p-4 border-b border-gray-700 flex justify-between items-center">
                    <h3 class="font-bold uppercase tracking-wider text-sm text-green-400">Entregados (<span id="countEntregado">0</span>)</h3>
                </div>
                <div id="columnaEntregado" class="flex-1 p-3 overflow-y-auto space-y-3 bg-gray-800/30">
                </div>
            </div>

        </div>

    </main>

    <!-- Usando module para mantener Clean Architecture -->
    <script type="module" src="js/logisticaApp.js"></script>
</body>
</html>
